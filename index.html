<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Pilar — Prototip casteller</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; overflow: hidden; background: #cfe3ee; font-family: -apple-system, "Segoe UI", Roboto, sans-serif; }
  #game { display: block; touch-action: none; }
  #ui { position: fixed; inset: 0; pointer-events: none; }

  .bars { position: absolute; top: 14px; left: 50%; transform: translateX(-50%); width: min(92%, 460px); }
  .label { font-size: 11px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; color: #4a5a66; margin: 0 0 3px 2px; }

  .bal-wrap { position: relative; height: 18px; background: #e7eef3; border-radius: 10px; overflow: hidden; box-shadow: inset 0 1px 3px rgba(0,0,0,.18); }
  .bal-zone { position: absolute; top: 0; bottom: 0; left: 33%; right: 33%; background: rgba(76,160,90,.4); }
  .bal-mark { position: absolute; top: -3px; width: 6px; height: 24px; background: #1c1c1c; border-radius: 3px; left: 50%; transform: translateX(-50%); }

  .fat-wrap { margin-top: 12px; height: 14px; background: #e7eef3; border-radius: 8px; overflow: hidden; box-shadow: inset 0 1px 3px rgba(0,0,0,.18); }
  .fat-fill { height: 100%; width: 100%; background: linear-gradient(90deg,#c94b2e 0%,#e6a23c 45%,#4ca05a 100%); border-radius: 8px; }

  .status { position: absolute; top: 92px; left: 50%; transform: translateX(-50%); font-size: 13px; font-weight: 700; color: #2c3942; background: rgba(255,255,255,.7); padding: 4px 14px; border-radius: 20px; white-space: nowrap; }

  .ctrls { position: absolute; bottom: 0; left: 0; right: 0; height: 38%; display: flex; pointer-events: auto; }
  .ctrl { flex: 1; display: flex; align-items: flex-end; justify-content: center; padding-bottom: 26px; }
  .ctrl span { font-size: 46px; color: rgba(40,40,40,.25); user-select: none; transition: color .08s, transform .08s; }
  .ctrl.active span { color: rgba(40,40,40,.65); transform: scale(.86); }

  .overlay { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 28px; pointer-events: auto; background: rgba(207,227,238,.94); }
  .overlay.hidden { display: none; }
  .overlay h1 { font-size: clamp(30px,9vw,52px); color: #1c2a33; letter-spacing: -.02em; margin-bottom: 8px; }
  .overlay .sub { font-size: 15px; color: #4a5a66; max-width: 320px; line-height: 1.5; margin-bottom: 26px; }
  .overlay .big { font-size: clamp(40px,13vw,72px); margin-bottom: 4px; }
  .btn { pointer-events: auto; background: #1c2a33; color: #f3efe4; border: none; font-size: 17px; font-weight: 700; padding: 14px 38px; border-radius: 40px; cursor: pointer; letter-spacing: .03em; }
  .btn:active { transform: scale(.96); }
  .hint { margin-top: 22px; font-size: 12px; color: #6b7a84; max-width: 300px; line-height: 1.5; }
  .res-sub { font-size: 16px; color: #4a5a66; margin-bottom: 24px; max-width: 320px; line-height: 1.5; }

  /* Colla creator + menu */
  .pv { width: 84px; height: 120px; }
  .preview { margin-bottom: 16px; }
  .txt { pointer-events: auto; font-size: 17px; padding: 12px 16px; border: 2px solid #c2cdd4; border-radius: 12px; width: min(86%,300px); text-align: center; margin-bottom: 18px; background: #fff; color: #1c2a33; }
  .txt:focus { outline: none; border-color: #2f6f8f; }
  .swatches { display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; max-width: 300px; margin-bottom: 26px; pointer-events: auto; }
  .sw { width: 42px; height: 42px; border-radius: 50%; cursor: pointer; border: 3px solid transparent; box-shadow: 0 1px 4px rgba(0,0,0,.2); transition: transform .08s; padding: 0; }
  .sw.sel { border-color: #1c2a33; transform: scale(1.12); }
  .sw:active { transform: scale(.95); }
  .colla-tag { display: flex; align-items: center; gap: 8px; font-size: 15px; font-weight: 700; color: #2c3942; margin-bottom: 6px; }
  .colla-dot { width: 16px; height: 16px; border-radius: 50%; background: #2f6f8f; box-shadow: 0 1px 3px rgba(0,0,0,.3); }
  .castell-list { display: flex; flex-direction: column; gap: 10px; width: min(90%,360px); margin-bottom: 22px; pointer-events: auto; }
  .castell { display: flex; align-items: center; justify-content: space-between; background: #fff; border: 2px solid #dfe6ea; border-radius: 14px; padding: 14px 16px; cursor: pointer; transition: transform .08s; }
  .castell.play:active { transform: scale(.98); }
  .castell.lock { cursor: default; }
  .castell .c-name { font-size: 16px; font-weight: 700; color: #1c2a33; }
  .castell .c-meta { font-size: 12px; color: #6b7a84; margin-top: 2px; }
  .castell .c-best { font-size: 13px; font-weight: 700; color: #2f6f8f; }
  .btn-ghost { pointer-events: auto; background: transparent; color: #2c3942; border: 2px solid #b9c4cb; font-size: 15px; font-weight: 700; padding: 11px 26px; border-radius: 30px; cursor: pointer; }
  .btn-ghost:active { transform: scale(.96); }
  .btn-row { display: flex; gap: 12px; align-items: center; }

  .sound-btn { position: fixed; top: 14px; right: 14px; z-index: 6; width: 42px; height: 42px; border-radius: 50%; border: none; background: rgba(255,255,255,.72); box-shadow: 0 1px 4px rgba(0,0,0,.18); font-size: 20px; line-height: 42px; text-align: center; cursor: pointer; pointer-events: auto; padding: 0; }
  .sound-btn:active { transform: scale(.92); }
</style>
</head>
<body>
<canvas id="game"></canvas>
<button id="soundBtn" class="sound-btn" aria-label="So">🔊</button>

<div id="ui">
  <div class="bars">
    <div class="label">Equilibri</div>
    <div class="bal-wrap"><div class="bal-zone"></div><div class="bal-mark" id="balMark"></div></div>
    <div class="label" style="margin-top:10px">Cansament</div>
    <div class="fat-wrap"><div class="fat-fill" id="fatFill"></div></div>
  </div>
  <div class="status" id="status">Prepara la pinya…</div>

  <div class="ctrls">
    <div class="ctrl" id="ctrlL"><span>◀</span></div>
    <div class="ctrl" id="ctrlR"><span>▶</span></div>
  </div>
</div>

<!-- Colla creator -->
<div class="overlay" id="creatorScreen">
  <h1 style="margin-bottom:2px">La teva colla</h1>
  <div class="sub" style="margin-bottom:14px">Posa-li nom i tria el color de la camisa.</div>
  <svg class="pv preview" viewBox="0 0 60 90" xmlns="http://www.w3.org/2000/svg">
    <rect x="22" y="58" width="6" height="24" rx="3" fill="#f1ece0" stroke="#1b2730" stroke-width="1.5"/>
    <rect x="32" y="58" width="6" height="24" rx="3" fill="#f1ece0" stroke="#1b2730" stroke-width="1.5"/>
    <rect class="pv-shirt" x="15" y="30" width="30" height="34" rx="10" fill="#2f6f8f" stroke="#1b2730" stroke-width="1.6"/>
    <rect x="15" y="50" width="30" height="11" rx="3" fill="#15212a"/>
    <circle cx="30" cy="22" r="10" fill="#e9c19a" stroke="#1b2730" stroke-width="1.6"/>
  </svg>
  <input id="collaName" class="txt" maxlength="22" placeholder="Nom de la colla">
  <div class="swatches" id="swatches"></div>
  <button class="btn" id="foundBtn">Fundar la colla</button>
</div>

<!-- Main menu -->
<div class="overlay hidden" id="menuScreen">
  <div class="colla-tag"><span class="colla-dot" id="collaDot"></span><span id="collaNameLbl">La meva colla</span></div>
  <svg class="pv" viewBox="0 0 60 90" xmlns="http://www.w3.org/2000/svg">
    <rect x="22" y="58" width="6" height="24" rx="3" fill="#f1ece0" stroke="#1b2730" stroke-width="1.5"/>
    <rect x="32" y="58" width="6" height="24" rx="3" fill="#f1ece0" stroke="#1b2730" stroke-width="1.5"/>
    <rect class="pv-shirt" x="15" y="30" width="30" height="34" rx="10" fill="#2f6f8f" stroke="#1b2730" stroke-width="1.6"/>
    <rect x="15" y="50" width="30" height="11" rx="3" fill="#15212a"/>
    <circle cx="30" cy="22" r="10" fill="#e9c19a" stroke="#1b2730" stroke-width="1.6"/>
  </svg>
  <h1 style="margin:6px 0 2px">Castells</h1>
  <div class="sub" style="margin-bottom:16px">Tria el repte. Descarrega'l per guanyar punts.</div>
  <div class="castell-list" id="castellList"></div>
  <button class="btn-ghost" id="editCollaBtn">Editar la colla</button>
</div>

<!-- Result -->
<div class="overlay hidden" id="endScreen">
  <div class="big" id="endEmoji">🎉</div>
  <h1 id="endTitle">Descarregat!</h1>
  <div class="res-sub" id="endSub"></div>
  <div class="btn-row">
    <button class="btn-ghost" id="menuBtn">Menú</button>
    <button class="btn" id="retryBtn">Una altra</button>
  </div>
</div>

<script>
(function () {
  "use strict";

  const canvas = document.getElementById("game");
  const ctx = canvas.getContext("2d");
  let W = 0, H = 0, DPR = 1;

  function resize() {
    DPR = Math.min(window.devicePixelRatio || 1, 2);
    W = window.innerWidth; H = window.innerHeight;
    canvas.width = W * DPR; canvas.height = H * DPR;
    canvas.style.width = W + "px"; canvas.style.height = H + "px";
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  }
  window.addEventListener("resize", resize);
  resize();

  // ---- Colla (player identity) ----
  const COLLA = {
    name: "La meva colla",
    shirt: "#2f6f8f",   // camisa
    shirtDark: "#255a74",
    faixa: "#15212a",   // faixa negra
    skin: "#e9c19a",
    pants: "#f1ece0",
  };

  // Palette of shirt colours (generic names, no real colla branding).
  const PALETTE = [
    { n: "Verd", c: "#3a8c4f" }, { n: "Rosa", c: "#d76a93" },
    { n: "Vermell", c: "#c8402f" }, { n: "Lila", c: "#7d5ba6" },
    { n: "Blau", c: "#2f6f8f" }, { n: "Granat", c: "#7a2230" },
    { n: "Taronja", c: "#e08a2e" }, { n: "Turquesa", c: "#2bb3a3" },
    { n: "Groc", c: "#d9b42b" }, { n: "Negre", c: "#2b3036" },
  ];

  function darken(hex, f) {
    const n = parseInt(hex.slice(1), 16);
    const r = Math.round(((n >> 16) & 255) * f);
    const g = Math.round(((n >> 8) & 255) * f);
    const b = Math.round((n & 255) * f);
    return "#" + ((1 << 24) | (r << 16) | (g << 8) | b).toString(16).slice(1);
  }
  function setShirt(hex) { COLLA.shirt = hex; COLLA.shirtDark = darken(hex, 0.8); }

  // ---- Castells. The pinya counts as the 1st pis, so a "Pilar de X" has the
  // pinya + (X-1) castellers in the trunk. `trunk` = people stacked above the pinya.
  const CASTELLS = [
    { id: "p4", num: 4, trunk: 3, cost: 0, diff: 0.82, pts: { desc: 50, carr: 30 } },
    { id: "p5", num: 5, trunk: 4, cost: 45, diff: 0.95, pts: { desc: 95, carr: 55 } },
    { id: "p6", num: 6, trunk: 5, cost: 100, diff: 1.1, pts: { desc: 160, carr: 95 } },
    { id: "p7", num: 7, trunk: 6, cost: 180, diff: 1.3, pts: { desc: 250, carr: 150 } },
    { id: "p8", num: 8, trunk: 7, cost: 300, diff: 1.52, pts: { desc: 380, carr: 220 } },
  ];
  const castName = (c) => "Pilar de " + c.num;

  // ---- Save / load ----
  const SAVE_KEY = "castells_save_v3";
  let save = { colla: null, best: {}, done: {}, castellers: 25 };
  function loadSave() {
    try { const s = JSON.parse(localStorage.getItem(SAVE_KEY)); if (s) save = Object.assign(save, s); } catch (e) {}
  }
  function persist() {
    try { localStorage.setItem(SAVE_KEY, JSON.stringify(save)); } catch (e) {}
  }

  let screen = "creator";       // "creator" | "menu" | "game"
  let curCastell = CASTELLS[0];

  // ---- Sound: synthesised gralla + tabal + crowd (Web Audio API, no files) ----
  const Sound = (() => {
    let ac = null, master = null, schedTimer = null, running = false, on = true;
    let step = 0, nextTime = 0, eighth = 0, tune = "toc";
    const BPM = 120, sixteenth = 60 / BPM / 4;

    function noiseBuffer(sec) {
      const len = Math.floor(ac.sampleRate * sec);
      const buf = ac.createBuffer(1, len, ac.sampleRate);
      const d = buf.getChannelData(0);
      let last = 0;
      for (let i = 0; i < len; i++) { const w = Math.random() * 2 - 1; last = (last + 0.02 * w) / 1.02; d[i] = last * 3.5; }
      return buf;
    }
    function startCrowd() {
      const src = ac.createBufferSource(); src.buffer = noiseBuffer(2); src.loop = true;
      const lp = ac.createBiquadFilter(); lp.type = "lowpass"; lp.frequency.value = 850;
      const hp = ac.createBiquadFilter(); hp.type = "highpass"; hp.frequency.value = 180;
      const cg = ac.createGain(); cg.gain.value = 0.16;
      const lfo = ac.createOscillator(); lfo.frequency.value = 0.13;
      const lfoG = ac.createGain(); lfoG.gain.value = 0.05;
      lfo.connect(lfoG); lfoG.connect(cg.gain);
      src.connect(hp); hp.connect(lp); lp.connect(cg); cg.connect(master);
      src.start(); lfo.start();
    }
    function tabal(t, accent) {
      const o = ac.createOscillator(); o.type = "sine";
      o.frequency.setValueAtTime(165, t); o.frequency.exponentialRampToValueAtTime(58, t + 0.12);
      const g = ac.createGain(); g.gain.setValueAtTime(accent ? 0.9 : 0.5, t); g.gain.exponentialRampToValueAtTime(0.001, t + 0.18);
      o.connect(g); g.connect(master); o.start(t); o.stop(t + 0.2);
      const n = ac.createBufferSource(); n.buffer = noiseBuffer(0.05);
      const bp = ac.createBiquadFilter(); bp.type = "bandpass"; bp.frequency.value = 2300;
      const ng = ac.createGain(); ng.gain.setValueAtTime(accent ? 0.32 : 0.18, t); ng.gain.exponentialRampToValueAtTime(0.001, t + 0.05);
      n.connect(bp); bp.connect(ng); ng.connect(master); n.start(t); n.stop(t + 0.06);
    }
    function gralla(t, freq, dur) {
      const o = ac.createOscillator(); o.type = "sawtooth"; o.frequency.value = freq;
      const vib = ac.createOscillator(); vib.frequency.value = 5.5;
      const vibG = ac.createGain(); vibG.gain.value = freq * 0.012;
      vib.connect(vibG); vibG.connect(o.frequency);
      const bp = ac.createBiquadFilter(); bp.type = "bandpass"; bp.frequency.value = 1600; bp.Q.value = 6;
      const g = ac.createGain();
      g.gain.setValueAtTime(0.0001, t);
      g.gain.exponentialRampToValueAtTime(0.2, t + 0.03);
      g.gain.setValueAtTime(0.2, t + dur * 0.7);
      g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
      o.connect(bp); bp.connect(g); g.connect(master);
      o.start(t); vib.start(t); o.stop(t + dur + 0.02); vib.stop(t + dur + 0.02);
    }
    // Catalan solfège → Hz (gralla register). The toc de castells is in mixolydian.
    const sol = 392.00, la = 440.00, si = 493.88, doN = 523.25, re = 587.33, mi = 659.25, fa = 698.46, solH = 783.99, laH = 880.00;
    // Main "toc de castells" phrase that accompanies the raising of the tower.
    const TOC = [
      solH, solH, solH, re, mi, fa, mi, re, doN, re,
      doN, si, re, solH, re, si, re, doN, si, doN,
      mi, re, mi, doN, re, si, 0, 0,
    ];
    // "Carregada": the aleta — a trill on re/mi and a held high sol, festive.
    const CARREGADA = [
      re, mi, re, mi, solH, solH, solH, solH,
      mi, fa, solH, laH, solH, 0, re, mi, re, mi, solH, solH, solH, 0,
    ];
    // "Sortida": the descending phrase that accompanies the descàrrega.
    const SORTIDA = [
      solH, fa, mi, re, doN, re, doN, si,
      la, si, doN, re, mi, re, doN, si,
      la, sol, la, si, doN, re, doN, 0,
    ];
    const tunes = { toc: TOC, carregada: CARREGADA, sortida: SORTIDA };
    function scheduleStep(s, t) {
      // tabal: a marching pulse, fuller during the carregada
      if (s % 4 === 0) tabal(t, s % 8 === 0);
      if (s === 10 || s === 14) tabal(t, false);
      if (tune === "carregada" && s % 2 === 0) tabal(t, s % 4 === 0);
      // gralla melody on eighth notes from the current tune
      if (s % 2 === 0) {
        const mel = tunes[tune];
        const f = mel[eighth % mel.length];
        if (f) gralla(t, f, sixteenth * 2 * 0.92);
        eighth++;
      }
    }
    function scheduler() {
      while (nextTime < ac.currentTime + 0.2) { scheduleStep(step % 16, nextTime); nextTime += sixteenth; step++; }
      schedTimer = setTimeout(scheduler, 50);
    }
    function setTune(name) { if (tunes[name] && name !== tune) { tune = name; eighth = 0; } }
    function ensure() {
      if (!on) return;
      if (!ac) {
        const AC = window.AudioContext || window.webkitAudioContext;
        if (!AC) return;
        ac = new AC();
        master = ac.createGain(); master.gain.value = 0; master.connect(ac.destination);
        startCrowd();
      }
      if (ac.state === "suspended") ac.resume();
      master.gain.cancelScheduledValues(ac.currentTime);
      master.gain.linearRampToValueAtTime(0.5, ac.currentTime + 0.6);
      if (!running) { running = true; step = 0; nextTime = ac.currentTime + 0.1; scheduler(); }
    }
    function setOn(v) {
      on = v;
      if (v) { ensure(); }
      else if (ac) { master.gain.cancelScheduledValues(ac.currentTime); master.gain.linearRampToValueAtTime(0, ac.currentTime + 0.3); clearTimeout(schedTimer); running = false; }
    }
    return { ensure, setOn, isOn: () => on, setTune };
  })();

  const ORD = ["Segon", "Terç", "Quart", "Quint", "Sisè", "Setè", "Vuitè", "Novè"];
  function levelName(i) {
    if (i === N - 1) return "Enxaneta";
    if (i === N - 2) return "Acotxador";
    return ORD[i] || ("Pis " + (i + 1));
  }
  let N = 6; // levels of the current castell (set in newGame)
  const PHASE = { READY: 0, UP: 1, ALETA: 2, DOWN: 3, WIN: 4, FALL: 5 };

  let state = null;

  function newGame() {
    N = curCastell.trunk;
    state = {
      phase: PHASE.READY,
      placed: 1,
      climbing: false,
      climbProg: 0,
      goingUp: true,
      lean: 0,
      leanVel: 0,
      fatigue: 1,
      aletaT: 0,
      settle: 0.6,
      time: 0,
      shake: 0,
      result: null,
      assaig: false,
      pos: [],          // recorded world positions of standing castellers (for the fall)
      debris: null,     // tumbling castellers when it falls
      fallT: 0,
      geo: { levelH: 46, groundY: 0, cxBase: 0, baseY: 0 },
    };
  }

  // ---- Input ----
  const input = { left: false, right: false };
  const ctrlL = document.getElementById("ctrlL");
  const ctrlR = document.getElementById("ctrlR");
  function bind(el, side) {
    const on = (e) => { e.preventDefault(); input[side] = true; el.classList.add("active"); };
    const off = (e) => { e.preventDefault(); input[side] = false; el.classList.remove("active"); };
    el.addEventListener("pointerdown", on);
    el.addEventListener("pointerup", off);
    el.addEventListener("pointercancel", off);
    el.addEventListener("pointerleave", off);
  }
  bind(ctrlL, "left"); bind(ctrlR, "right");
  window.addEventListener("keydown", (e) => {
    if (e.key === "ArrowLeft" || e.key === "a") input.left = true;
    if (e.key === "ArrowRight" || e.key === "d") input.right = true;
  });
  window.addEventListener("keyup", (e) => {
    if (e.key === "ArrowLeft" || e.key === "a") input.left = false;
    if (e.key === "ArrowRight" || e.key === "d") input.right = false;
  });

  // ---- Logic ----
  function difficulty() {
    const heightFactor = 0.55 + state.placed * 0.26;
    const climbFactor = state.climbing ? 1.45 : 1;
    const fatigueFactor = 1 + (1 - state.fatigue) * 0.6;
    const castFactor = curCastell.diff || 1;
    return heightFactor * climbFactor * fatigueFactor * castFactor;
  }

  let noiseT = 0;
  function update(dt) {
    if (!state) return;
    state.time += dt;
    state.shake *= Math.pow(0.001, dt);
    if (state.phase === PHASE.FALL) { updateDebris(dt); return; }
    if (state.phase === PHASE.READY || state.phase === PHASE.WIN) return;

    const diff = difficulty();

    noiseT += dt;
    const wobble = Math.sin(noiseT * 2.1) * 0.5 + Math.sin(noiseT * 5.3 + 1.3) * 0.3 + (Math.random() - 0.5) * 0.5;
    state.leanVel += wobble * diff * 0.34 * dt;
    state.leanVel += state.lean * diff * 1.2 * dt;     // instability (grows with height)

    const control = 2.1;
    if (input.left) state.leanVel -= control * dt;
    if (input.right) state.leanVel += control * dt;

    state.leanVel *= Math.pow(0.05, dt);
    state.lean += state.leanVel * dt;

    // Fatigue — tuned so a clean carregar+descarregar is achievable.
    const drain = (0.015 + state.placed * 0.0035) * (state.phase === PHASE.UP ? 1 : 0.85);
    state.fatigue -= drain * dt;
    if (state.fatigue <= 0) { state.fatigue = 0; fall("Els castellers no han aguantat el pes."); return; }
    if (Math.abs(state.lean) >= 1) { fall("Ha perdut l'equilibri."); return; }

    if (state.phase === PHASE.UP) {
      if (state.climbing) {
        state.climbProg += dt * 0.55;
        if (state.climbProg >= 1) {
          state.climbing = false; state.climbProg = 0; state.placed++;
          state.shake = Math.min(1, state.shake + 0.3);
          if (state.placed >= N) { state.phase = PHASE.ALETA; state.aletaT = 0; Sound.setTune("carregada"); }
          else state.settle = 0.45;
        }
      } else {
        state.settle -= dt;
        if (state.settle <= 0 && Math.abs(state.lean) < 0.5) { state.climbing = true; state.climbProg = 0; }
      }
    } else if (state.phase === PHASE.ALETA) {
      state.aletaT += dt;
      if (state.aletaT > 1.5) { state.phase = PHASE.DOWN; state.goingUp = false; state.settle = 0.4; Sound.setTune("sortida"); }
    } else if (state.phase === PHASE.DOWN) {
      if (state.climbing) {
        // the detached casteller clambers all the way down to the pinya
        state.climbProg += dt * 0.5;
        if (state.climbProg >= 1) {
          state.climbing = false; state.climbProg = 0;
          if (state.placed <= 1) win();
          else state.settle = 0.3;
        }
      } else {
        state.settle -= dt;
        if (state.settle <= 0 && Math.abs(state.lean) < 0.55) {
          state.placed--;            // detach the current top, it starts descending
          state.climbing = true; state.climbProg = 0;
        }
      }
    }
    updateUI();
  }

  function fall(reason) {
    state.phase = PHASE.FALL;
    state.result = { ok: false, reason };
    state.fallT = 0;
    // seed the tumbling castellers from their last standing positions; they fall
    // toward the side it was leaning and pile onto the pinya
    const side = Math.sign(state.lean) || 1;
    state.debris = (state.pos || []).map((p) => ({
      x: p.x, y: p.y, rot: p.rot, idx: p.idx, isTop: p.isTop,
      vx: side * (40 + Math.random() * 120) + (Math.random() - 0.5) * 60,
      vy: -30 - Math.random() * 70,
      vr: (Math.random() - 0.5) * 7,
      rest: false,
    }));
    Sound.setTune("toc");
    setTimeout(showEnd, 1700);
  }
  function updateDebris(dt) {
    if (!state.debris) return;
    state.fallT += dt;
    const floorY = state.geo.groundY - 4;
    for (const d of state.debris) {
      if (d.rest) continue;
      d.vy += 1100 * dt;
      d.x += d.vx * dt; d.y += d.vy * dt; d.rot += d.vr * dt;
      const land = floorY - (d.idx % 3) * 4; // pile slightly
      if (d.y >= land) {
        d.y = land; d.vy *= -0.22; d.vx *= 0.5; d.vr *= 0.4;
        if (Math.abs(d.vy) < 40) { d.vy = 0; d.vr = 0; d.rest = true; d.rot = Math.sign(d.rot || 1) * Math.PI * 0.5; }
      }
    }
  }
  function win() { state.phase = PHASE.WIN; state.result = { ok: true }; Sound.setTune("carregada"); setTimeout(showEnd, 700); }

  // ---- UI ----
  const balMark = document.getElementById("balMark");
  const fatFill = document.getElementById("fatFill");
  const statusEl = document.getElementById("status");
  function updateUI() {
    balMark.style.left = (50 + state.lean * 50) + "%";
    const d = Math.abs(state.lean);
    balMark.style.background = d > 0.66 ? "#c94b2e" : (d > 0.4 ? "#e6a23c" : "#1c1c1c");
    fatFill.style.width = (state.fatigue * 100) + "%";
    let t = "";
    if (state.phase === PHASE.UP) t = state.climbing ? "Puja el " + levelName(state.placed) + "…" : "Aguanta!";
    else if (state.phase === PHASE.ALETA) t = "L'enxaneta fa l'aleta! 🙌";
    else if (state.phase === PHASE.DOWN) t = "Descarregant… aguanta!";
    statusEl.textContent = t;
  }

  // ---- Geometry helpers ----
  let levelH = 46, baseY = 0, cxBase = 0;
  let ANIM = 0; // animation clock (seconds)

  // ---- Rendering ----
  function draw() {
    // sky
    const grd = ctx.createLinearGradient(0, 0, 0, H);
    grd.addColorStop(0, "#cfe3ee"); grd.addColorStop(1, "#e8eedf");
    ctx.fillStyle = grd; ctx.fillRect(0, 0, W, H);

    // soft sun
    ctx.fillStyle = "rgba(255,243,205,.55)";
    ctx.beginPath(); ctx.arc(W * 0.8, H * 0.15, Math.min(W, H) * 0.085, 0, Math.PI * 2); ctx.fill();

    const groundY = H * 0.84;
    // ground
    ctx.fillStyle = "#d8cfb8"; ctx.fillRect(0, groundY + 4, W, H);
    ctx.strokeStyle = "rgba(60,54,44,.18)"; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(0, groundY + 4); ctx.lineTo(W, groundY + 4); ctx.stroke();

    if (screen !== "game" || !state) return;

    // soft shadow under the pinya
    ctx.fillStyle = "rgba(60,54,44,.12)";
    ctx.beginPath(); ctx.ellipse(W / 2, groundY + 8, Math.min(W * 0.42, 215), 15, 0, 0, Math.PI * 2); ctx.fill();

    const tremor = Math.max(0, Math.abs(state.lean) - 0.45) * 7;
    cxBase = W / 2 + (state.shake ? (Math.random() - 0.5) * state.shake * 7 : 0) + (Math.random() - 0.5) * tremor;
    levelH = Math.min(48, (groundY - H * 0.12) / (N + 1));
    const pinyaTop = groundY - 40;
    baseY = pinyaTop + levelH * 0.06;   // the segon's FEET rest on the pinya
    const pinyaR = Math.min(W * 0.44, 230);
    state.geo = { levelH: levelH, groundY: groundY, cxBase: cxBase, baseY: baseY };

    // --- the castell has fallen: castellers tumble onto the pinya ---
    if (state.phase === PHASE.FALL && state.debris) {
      drawPinya(cxBase, groundY, pinyaR);
      const ds = state.debris.slice().sort((a, b) => a.y - b.y);
      for (const d of ds) {
        ctx.save(); ctx.translate(d.x, d.y); ctx.rotate(d.rot);
        drawCasteller(0, 0, d.idx, d.isTop, false, 1, false, 0);
        ctx.restore();
      }
      return;
    }

    // A real pilar barely tilts — it FLEXES: the base stays firm and the sway
    // accumulates upwards, so the enxaneta moves the most.
    const topSway = state.lean * levelH * 1.0;
    const denom = Math.max(1, N - 1);
    const bendX = (lvl) => topSway * Math.pow(lvl / denom, 1.6);
    const bendA = (lvl) => state.lean * 0.12 * (lvl / denom);
    const drawAt = (lvl, yOff, idx, isTop, aleta, climbing, part) => {
      ctx.save();
      ctx.translate(cxBase + bendX(lvl), baseY - levelH * lvl + (yOff || 0));
      ctx.rotate(bendA(lvl));
      drawCasteller(0, 0, idx, isTop, aleta, 1, climbing, part);
      ctx.restore();
    };

    // record standing positions (used to seed the fall)
    state.pos = [];
    for (let i = 0; i < state.placed; i++) state.pos.push({ x: cxBase + bendX(i), y: baseY - levelH * i, rot: bendA(i), idx: i, isTop: i === N - 1 });

    const p = state.climbProg;
    const bob = Math.sin(p * N * Math.PI * 2) * levelH * 0.04;

    // Climber (up OR down) is drawn BEHIND the trunk → climbs the backs of the others.
    if (state.climbing) {
      const curLevel = state.goingUp ? state.placed * p : state.placed * (1 - p);
      drawAt(curLevel, bob, state.placed, state.placed === N - 1, false, true, 0);
    }

    // The standing trunk: bodies first, then all heads on top so legs never cover a face.
    for (let i = 0; i < state.placed; i++) drawAt(i, 0, i, i === N - 1, i === N - 1, false, 1);
    for (let i = 0; i < state.placed; i++) drawAt(i, 0, i, i === N - 1, i === N - 1, false, 2);

    // Pinya drawn last (in front) so it hides the segon's feet → he sits in the pinya.
    drawPinya(cxBase, groundY, pinyaR);
  }

  function smooth(t) { t = Math.max(0, Math.min(1, t)); return t * t * (3 - 2 * t); }

  // Filled tapered limb (trapezoid) between two points, with optional outline.
  function quadLimb(ax, ay, aw, bx, by, bw, fill, stroke) {
    const dx = bx - ax, dy = by - ay, len = Math.hypot(dx, dy) || 1;
    const nx = -dy / len, ny = dx / len;
    ctx.beginPath();
    ctx.moveTo(ax + nx * aw, ay + ny * aw);
    ctx.lineTo(bx + nx * bw, by + ny * bw);
    ctx.lineTo(bx - nx * bw, by - ny * bw);
    ctx.lineTo(ax - nx * aw, ay - ny * aw);
    ctx.closePath();
    if (fill) { ctx.fillStyle = fill; ctx.fill(); }
    if (stroke) { ctx.strokeStyle = stroke; ctx.lineWidth = 1.4; ctx.stroke(); }
  }

  // A casteller drawn with VOLUME. Origin is at the FEET (which rest on the
  // shoulders of the one below). The head pokes up between the legs of the
  // casteller above; each one reaches up and grips the calves of the one above.
  function drawCasteller(x, y, idx, isTop, aleta, alpha, climbing, part) {
    part = part || 0; // 0=all, 1=body only, 2=head only
    const u = levelH;
    const L = u * 0.55, T = u * 0.45;       // leg + torso = u (shoulder height)
    const breath = Math.sin(ANIM * 1.8 + idx * 0.9) * u * 0.012; // subtle breathing
    const hipY = -L, shoY = -(L + T) - breath;
    const sw = u * (isTop ? 0.155 : 0.185); // half shoulder width (top is slimmer)
    const hw = u * 0.1;                     // half hip
    const fs = u * 0.185;                   // feet on the shoulders below (wide enough for the head to show)
    const R = u * 0.135;                    // head radius
    const headY = shoY - R * 1.02;
    const OUT = "#202a31";
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.translate(x, y);
    ctx.lineJoin = "round"; ctx.lineCap = "round";

    const hand = (hx, hy) => {
      ctx.fillStyle = COLLA.skin; ctx.strokeStyle = OUT; ctx.lineWidth = 1.1;
      ctx.beginPath(); ctx.arc(hx, hy, u * 0.05, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
    };
    const arm = (sx, sy, ex, ey, hx, hy) => {
      quadLimb(sx, sy, u * 0.062, ex, ey, u * 0.05, COLLA.shirt, OUT);  // sleeve
      quadLimb(ex, ey, u * 0.045, hx, hy, u * 0.038, COLLA.skin, OUT);  // forearm
      hand(hx, hy);
    };

    if (part !== 2) {
      // soft contact shadow where the feet rest on the shoulders below
      ctx.fillStyle = "rgba(20,28,34,.18)";
      ctx.beginPath(); ctx.ellipse(0, u * 0.04, u * 0.32, u * 0.07, 0, 0, Math.PI * 2); ctx.fill();

      // --- legs (trousers) + shoes ---
      quadLimb(-fs, 0, u * 0.085, -hw, hipY, u * 0.092, COLLA.pants, OUT);
      quadLimb(fs, 0, u * 0.085, hw, hipY, u * 0.092, COLLA.pants, OUT);
      ctx.strokeStyle = "rgba(20,28,34,.12)"; ctx.lineWidth = u * 0.05;
      ctx.beginPath(); ctx.moveTo(-fs * 0.5, hipY + u * 0.05); ctx.lineTo(-hw * 0.2, -u * 0.02); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(fs * 0.5, hipY + u * 0.05); ctx.lineTo(hw * 0.2, -u * 0.02); ctx.stroke();
      ctx.fillStyle = "#39302a"; ctx.strokeStyle = OUT; ctx.lineWidth = 1.2;
      ctx.beginPath(); ctx.ellipse(-fs, 1, u * 0.105, u * 0.052, 0, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
      ctx.beginPath(); ctx.ellipse(fs, 1, u * 0.105, u * 0.052, 0, 0, Math.PI * 2); ctx.fill(); ctx.stroke();

      // --- torso (shirt) with volume ---
      const torsoPath = () => {
        ctx.beginPath();
        ctx.moveTo(-hw, hipY + u * 0.04);
        ctx.lineTo(-sw, shoY + u * 0.06);
        ctx.quadraticCurveTo(-sw, shoY - u * 0.05, -sw * 0.5, shoY - u * 0.05);
        ctx.lineTo(sw * 0.5, shoY - u * 0.05);
        ctx.quadraticCurveTo(sw, shoY - u * 0.05, sw, shoY + u * 0.06);
        ctx.lineTo(hw, hipY + u * 0.04);
        ctx.closePath();
      };
      const g = ctx.createLinearGradient(-sw, 0, sw, 0);
      g.addColorStop(0, COLLA.shirtDark); g.addColorStop(0.4, COLLA.shirt); g.addColorStop(0.62, COLLA.shirt); g.addColorStop(1, COLLA.shirtDark);
      ctx.fillStyle = g; ctx.strokeStyle = OUT; ctx.lineWidth = 1.6;
      torsoPath(); ctx.fill(); ctx.stroke();
      ctx.save(); torsoPath(); ctx.clip();
      const gv = ctx.createLinearGradient(0, shoY, 0, hipY);
      gv.addColorStop(0, "rgba(255,255,255,.16)"); gv.addColorStop(0.5, "rgba(255,255,255,0)"); gv.addColorStop(1, "rgba(0,0,0,.16)");
      ctx.fillStyle = gv; torsoPath(); ctx.fill();
      ctx.fillStyle = "rgba(255,255,255,.1)";
      ctx.beginPath(); ctx.ellipse(-sw * 0.3, shoY + T * 0.35, sw * 0.35, T * 0.4, 0, 0, Math.PI * 2); ctx.fill();
      ctx.restore();

      // --- faixa ---
      ctx.fillStyle = COLLA.faixa;
      ctx.beginPath(); roundRect(-hw * 1.25, hipY - u * 0.04, hw * 2.5, u * 0.18, u * 0.03); ctx.fill();
      ctx.strokeStyle = "rgba(0,0,0,.35)"; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(-hw, hipY + u * 0.04); ctx.lineTo(hw, hipY + u * 0.04); ctx.stroke();

      // --- arms ---
      if (aleta) {
        arm(sw * 0.7, shoY + u * 0.05, sw * 1.1, shoY - u * 0.12, sw * 1.32, shoY - u * 0.56);
        arm(-sw * 0.7, shoY + u * 0.05, -sw * 1.05, hipY - u * 0.08, -hw * 1.15, hipY + u * 0.02);
      } else if (climbing) {
        arm(-sw * 0.6, shoY + u * 0.05, -sw * 0.5, shoY - u * 0.2, -u * 0.07, shoY - u * 0.46);
        arm(sw * 0.6, shoY + u * 0.05, sw * 0.5, shoY - u * 0.2, u * 0.07, shoY - u * 0.46);
      } else {
        arm(-sw * 0.75, shoY + u * 0.05, -sw * 1.02, shoY - u * 0.04, -fs * 0.95, shoY - u * 0.22);
        arm(sw * 0.75, shoY + u * 0.05, sw * 1.02, shoY - u * 0.04, fs * 0.95, shoY - u * 0.22);
      }
    }

    if (part !== 1) {
      // --- neck + head (drawn in a later pass so legs never cover the face) ---
      ctx.fillStyle = COLLA.skin; ctx.strokeStyle = OUT; ctx.lineWidth = 1.4;
      ctx.beginPath(); roundRect(-u * 0.05, shoY - u * 0.06, u * 0.1, u * 0.1, u * 0.03); ctx.fill(); ctx.stroke();
      ctx.beginPath(); ctx.ellipse(0, headY, R * 0.92, R, 0, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
      ctx.save(); ctx.beginPath(); ctx.ellipse(0, headY, R * 0.92, R, 0, 0, Math.PI * 2); ctx.clip();
      ctx.fillStyle = "rgba(0,0,0,.08)"; ctx.fillRect(R * 0.25, headY - R, R, R * 2);
      ctx.fillStyle = "#33271c";
      ctx.beginPath(); ctx.ellipse(-R * 0.82, headY + R * 0.1, R * 0.3, R * 0.6, 0, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.ellipse(R * 0.82, headY + R * 0.1, R * 0.3, R * 0.6, 0, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = COLLA.shirt; ctx.fillRect(-R, headY - R * 1.05, R * 2, R * 0.95);
      ctx.fillStyle = darken(COLLA.shirt, 0.78); ctx.fillRect(-R, headY - R * 0.12, R * 2, R * 0.06);
      ctx.restore();
      // mocador knot on the side
      ctx.fillStyle = COLLA.shirt; ctx.strokeStyle = OUT; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.arc(R * 0.86, headY - R * 0.25, R * 0.2, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
      // eyes, nose, mouth
      ctx.fillStyle = "#2a2018";
      ctx.beginPath(); ctx.arc(-R * 0.32, headY + R * 0.22, R * 0.1, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(R * 0.32, headY + R * 0.22, R * 0.1, 0, Math.PI * 2); ctx.fill();
      ctx.strokeStyle = "rgba(120,75,55,.55)"; ctx.lineWidth = 1.1;
      ctx.beginPath(); ctx.moveTo(0, headY + R * 0.2); ctx.lineTo(-R * 0.06, headY + R * 0.42); ctx.stroke();
      ctx.beginPath(); ctx.arc(0, headY + R * 0.5, R * 0.24, 0.15 * Math.PI, 0.85 * Math.PI); ctx.stroke();
    }

    ctx.restore();
  }

  // The pinya (no folre): everyone faces the tower and looks DOWN, huddled in a
  // dense mound around the base. We only see napes, hair and mocadors (NO faces),
  // and the front rows' arms stretch forward toward the centre.
  function drawPinya(cx, gy, radius) {
    const OUT = "#202a31";
    const rows = [
      { dy: -48, hw: radius * 0.5, s: 7.5 },
      { dy: -35, hw: radius * 0.72, s: 8.5 },
      { dy: -20, hw: radius * 0.91, s: 9.5 },
      { dy: -3, hw: radius * 1.06, s: 10.5 },
    ];
    rows.forEach((row, ri) => {
      const ry = gy + row.dy, s = row.s, step = s * 1.3;
      const count = Math.floor((row.hw * 2) / step) + 1;
      const startX = cx - (count - 1) * step / 2 + (ri % 2) * step * 0.5;
      const xs = [];
      for (let i = 0; i < count; i++) xs.push(startX + i * step);
      xs.sort((a, b) => Math.abs(b - cx) - Math.abs(a - cx)); // outer first, centre on top
      for (const x of xs) {
        const dir = x <= cx ? 1 : -1;
        const moc = Math.round((x - startX) / step) % 2 === 0;
        // shoulders behind the head
        ctx.fillStyle = COLLA.shirtDark; ctx.strokeStyle = OUT; ctx.lineWidth = 1.2;
        ctx.beginPath(); ctx.ellipse(x, ry + s * 0.75, s * 1.05, s * 0.82, 0, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
        // arm stretched forward toward the centre (front rows only)
        if (ri >= 2) {
          ctx.strokeStyle = COLLA.shirtDark; ctx.lineWidth = s * 0.42; ctx.lineCap = "round";
          ctx.beginPath(); ctx.moveTo(x + dir * s * 0.45, ry + s * 0.8);
          ctx.quadraticCurveTo(x + dir * s * 1.2, ry + s * 0.8, x + dir * s * 1.5, ry + s * 1.05); ctx.stroke();
        }
        // head from behind/above (looking down) — hair or mocador, NO face
        const hr = s * 0.8, hy = ry;
        ctx.fillStyle = moc ? COLLA.shirt : "#3a2c20"; ctx.strokeStyle = OUT; ctx.lineWidth = 1.2;
        ctx.beginPath(); ctx.arc(x, hy, hr, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
        if (moc) { ctx.fillStyle = darken(COLLA.shirt, 0.7); ctx.beginPath(); ctx.arc(x, hy + hr * 0.42, hr * 0.22, 0, Math.PI * 2); ctx.fill(); }
        else { ctx.strokeStyle = "#2a2018"; ctx.lineWidth = 1; ctx.beginPath(); ctx.moveTo(x, hy - hr * 0.7); ctx.lineTo(x, hy + hr * 0.5); ctx.stroke(); }
        // nape (clatell) hint
        ctx.fillStyle = COLLA.skin;
        ctx.beginPath(); ctx.arc(x, hy + hr * 0.68, hr * 0.4, 0.15 * Math.PI, 0.85 * Math.PI); ctx.fill();
      }
    });
  }

  function roundRect(x, y, w, h, r) {
    ctx.moveTo(x + r, y);
    ctx.arcTo(x + w, y, x + w, y + h, r);
    ctx.arcTo(x + w, y + h, x, y + h, r);
    ctx.arcTo(x, y + h, x, y, r);
    ctx.arcTo(x, y, x + w, y, r);
    ctx.closePath();
  }

  // ---- Loop ----
  let last = performance.now();
  function frame(now) {
    let dt = (now - last) / 1000; last = now;
    if (dt > 0.05) dt = 0.05;
    ANIM = now / 1000;
    if (screen === "game") update(dt);
    draw();
    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);

  // ---- Screens ----
  const uiEl = document.getElementById("ui");
  const creatorScreen = document.getElementById("creatorScreen");
  const menuScreen = document.getElementById("menuScreen");
  const endScreen = document.getElementById("endScreen");
  const collaNameInput = document.getElementById("collaName");
  const swatchesEl = document.getElementById("swatches");
  let pickedColor = COLLA.shirt;

  function applyPreviewColor() {
    document.querySelectorAll(".pv-shirt").forEach((el) => el.setAttribute("fill", pickedColor));
    const dot = document.getElementById("collaDot");
    if (dot) dot.style.background = COLLA.shirt;
  }

  // Build colour swatches once.
  PALETTE.forEach((p) => {
    const b = document.createElement("button");
    b.className = "sw"; b.style.background = p.c; b.title = p.n;
    b.addEventListener("click", () => {
      pickedColor = p.c;
      swatchesEl.querySelectorAll(".sw").forEach((s) => s.classList.remove("sel"));
      b.classList.add("sel");
      applyPreviewColor();
    });
    swatchesEl.appendChild(b);
  });

  function markSwatch() {
    const els = swatchesEl.querySelectorAll(".sw");
    PALETTE.forEach((p, i) => els[i].classList.toggle("sel", p.c === pickedColor));
  }

  function showCreator() {
    screen = "creator";
    pickedColor = COLLA.shirt;
    collaNameInput.value = COLLA.name === "La meva colla" && !save.colla ? "" : COLLA.name;
    markSwatch(); applyPreviewColor();
    uiEl.style.display = "none";
    creatorScreen.classList.remove("hidden");
    menuScreen.classList.add("hidden");
    endScreen.classList.add("hidden");
  }

  function showMenu() {
    screen = "menu";
    document.getElementById("collaNameLbl").textContent = COLLA.name;
    applyPreviewColor();
    // (Re)build castell list.
    const list = document.getElementById("castellList");
    document.getElementById("collaNameLbl").textContent = COLLA.name + "  ·  🧍 " + save.castellers + " castellers";
    list.innerHTML = "";

    // ASSAIG — practice freely and earn castellers (no cost)
    const assaig = document.createElement("div");
    assaig.className = "castell play assaig-row";
    assaig.innerHTML =
      '<div><div class="c-name">🛠️ Assaig</div>' +
      '<div class="c-meta">Practica i guanya castellers</div></div>' +
      '<div class="c-best">Entrena</div>';
    assaig.addEventListener("click", () => begin(CASTELLS[0], true));
    list.appendChild(assaig);

    CASTELLS.forEach((c) => {
      const locked = save.castellers < c.cost;
      const row = document.createElement("div");
      row.className = "castell " + (locked ? "lock" : "play");
      const best = save.best[c.id];
      const meta = locked ? "Necessites 🧍 " + c.cost + " castellers" : (c.trunk + 1) + " pisos · pinya + " + c.trunk + " de tronc";
      row.innerHTML =
        '<div><div class="c-name">' + (locked ? "🔒 " : (save.done[c.id] ? "✓ " : "")) + castName(c) + '</div>' +
        '<div class="c-meta">' + meta + '</div></div>' +
        '<div class="c-best">' + (locked ? "🧍 " + c.cost : (best ? best + " pts" : "Juga")) + '</div>';
      if (!locked) row.addEventListener("click", () => begin(c, false));
      list.appendChild(row);
    });
    uiEl.style.display = "none";
    menuScreen.classList.remove("hidden");
    creatorScreen.classList.add("hidden");
    endScreen.classList.add("hidden");
  }

  function begin(castell, assaig) {
    curCastell = castell || curCastell;
    newGame(); state.phase = PHASE.UP; state.assaig = !!assaig;
    Sound.setTune("toc"); Sound.ensure();
    screen = "game";
    uiEl.style.display = "";
    creatorScreen.classList.add("hidden");
    menuScreen.classList.add("hidden");
    endScreen.classList.add("hidden");
  }

  function showEnd() {
    const r = state.result;
    const emoji = document.getElementById("endEmoji");
    const title = document.getElementById("endTitle");
    const sub = document.getElementById("endSub");
    let pts = 0, earned = 0;
    if (r.ok) {
      pts = curCastell.pts.desc;
      earned = curCastell.trunk * 10;
      const wasNew = !state.assaig && !save.done[curCastell.id];
      const idx = CASTELLS.indexOf(curCastell);
      const next = CASTELLS[idx + 1];
      if (!state.assaig) save.done[curCastell.id] = true;
      emoji.textContent = "🎉"; title.textContent = "Descarregat!";
      sub.textContent = "Carregat i descarregat. +" + pts + " punts · +🧍 " + earned + " castellers." +
        (wasNew && next && save.castellers + earned >= next.cost ? " Ja pots provar el " + castName(next) + "!" : "");
    } else if (state.placed >= N) {
      pts = curCastell.pts.carr; earned = curCastell.trunk * 5;
      emoji.textContent = "😬"; title.textContent = "Carregat… però llenya!";
      sub.textContent = r.reason + " Coronat però no descarregat. +" + pts + " punts · +🧍 " + earned + ".";
    } else {
      earned = state.placed * 3;
      emoji.textContent = "💥"; title.textContent = "Llenya!";
      sub.textContent = r.reason + " +🧍 " + earned + " castellers per l'esforç.";
    }
    if (!state.assaig && pts > (save.best[curCastell.id] || 0)) save.best[curCastell.id] = pts;
    save.castellers += earned;
    persist();
    uiEl.style.display = "none";
    endScreen.classList.remove("hidden");
  }

  // Wire up buttons.
  document.getElementById("foundBtn").addEventListener("click", () => {
    const name = collaNameInput.value.trim();
    COLLA.name = name || "La meva colla";
    setShirt(pickedColor);
    save.colla = { name: COLLA.name, color: COLLA.shirt };
    persist();
    showMenu();
  });
  document.getElementById("editCollaBtn").addEventListener("click", showCreator);
  document.getElementById("menuBtn").addEventListener("click", showMenu);
  document.getElementById("retryBtn").addEventListener("click", () => begin(curCastell));

  const soundBtn = document.getElementById("soundBtn");
  soundBtn.addEventListener("click", () => {
    const v = !Sound.isOn();
    Sound.setOn(v);
    soundBtn.textContent = v ? "🔊" : "🔇";
  });

  // ---- Boot ----
  loadSave();
  if (save.colla) { COLLA.name = save.colla.name; setShirt(save.colla.color); showMenu(); }
  else { showCreator(); }
})();
</script>
</body>
</html>
